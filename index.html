<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Social Lab</title>
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html { background: #000; }
    body {
      font-family: var(--font);
      background: #000;
      color: #f5f5f7;
      overflow-x: hidden;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
    }
    nav span {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(245,245,247,0.9);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 80px;
      position: relative;
    }
    .hero-overline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(245,245,247,0.5);
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.05;
      max-width: 680px;
    }
    .hero h1 .em {
      background: linear-gradient(90deg, #2997ff, #6dd5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      margin-top: 20px;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(245,245,247,0.5);
      max-width: 460px;
    }
    .hero-scroll {
      position: absolute;
      bottom: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(245,245,247,0.3);
      font-size: 11px;
      letter-spacing: 0.06em;
      animation: fadeInUp 1s ease 1.2s both;
    }
    .hero-scroll::after {
      content: '';
      width: 1px;
      height: 28px;
      background: linear-gradient(rgba(245,245,247,0.3), transparent);
      animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51% { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Section */
    .section {
      max-width: 980px;
      margin: 0 auto;
      padding: 100px 24px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(245,245,247,0.35);
      margin-bottom: 40px;
    }

    /* Experiment Card */
    .exp-card {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 24px;
      overflow: hidden;
      background: #111;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    .exp-card:hover {
      transform: scale(1.01);
    }
    .exp-card:active {
      transform: scale(0.99);
      transition-duration: 0.15s;
    }

    .exp-visual {
      position: relative;
      width: 100%;
      aspect-ratio: 21 / 9;
      overflow: hidden;
    }
    .exp-visual canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .exp-body {
      padding: 48px;
    }
    .exp-num {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,245,247,0.3);
      margin-bottom: 12px;
    }
    .exp-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 14px;
    }
    .exp-desc {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.6;
      color: rgba(245,245,247,0.5);
      max-width: 520px;
      margin-bottom: 32px;
    }
    .exp-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 36px;
    }
    .exp-tag {
      font-size: 12px;
      font-weight: 500;
      color: rgba(245,245,247,0.45);
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid rgba(245,245,247,0.1);
    }
    .exp-tag.live {
      color: #30d158;
      border-color: rgba(48,209,88,0.25);
    }
    .exp-tag.live::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #30d158;
      margin-right: 6px;
      vertical-align: middle;
    }
    .exp-link {
      font-size: 17px;
      font-weight: 400;
      color: #2997ff;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap 0.3s ease;
    }
    .exp-card:hover .exp-link {
      gap: 8px;
    }
    .exp-link svg {
      width: 16px; height: 16px;
      transition: transform 0.3s ease;
    }
    .exp-card:hover .exp-link svg {
      transform: translateX(2px);
    }

    /* Divider */
    .divider {
      max-width: 980px;
      margin: 0 auto;
      height: 1px;
      background: rgba(245,245,247,0.08);
    }

    /* Coming */
    .coming {
      max-width: 980px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }
    .coming p {
      font-size: 19px;
      font-weight: 400;
      color: rgba(245,245,247,0.25);
    }

    /* Footer */
    footer {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 24px 40px;
      text-align: center;
      font-size: 12px;
      color: rgba(245,245,247,0.2);
      letter-spacing: 0.02em;
    }

    @media (max-width: 734px) {
      .hero h1 { font-size: 40px; }
      .hero-sub { font-size: 17px; }
      .exp-body { padding: 28px; }
      .exp-title { font-size: 26px; }
      .exp-desc { font-size: 15px; }
      .exp-visual { aspect-ratio: 16 / 9; }
    }
  </style>
</head>
<body>

<nav><span>Social Lab</span></nav>

<!-- Hero -->
<section class="hero">
  <p class="hero-overline">Social Experiment Platform</p>
  <h1>探索人与人之间<br><span class="em">未曾发现的连接</span></h1>
  <p class="hero-sub">我们设计社交实验，在真实的互动中，观察关系如何自然发生。</p>
  <div class="hero-scroll">向下滚动</div>
</section>

<!-- Experiments -->
<div class="divider"></div>

<section class="section">
  <p class="section-label">Experiments</p>

  <a class="exp-card" href="games/遛狗/index.html">
    <div class="exp-visual">
      <canvas id="cv1"></canvas>
    </div>
    <div class="exp-body">
      <p class="exp-num">No. 001</p>
      <h2 class="exp-title">共同遛狗计划</h2>
      <p class="exp-desc">在一座虚拟公园里，每个人都在遛自己的狗。当两只宠物自发地靠近彼此，它们的主人是否也会开始一段对话？</p>
      <div class="exp-tags">
        <span class="exp-tag live">进行中</span>
        <span class="exp-tag">陌生人破冰</span>
        <span class="exp-tag">非语言社交</span>
      </div>
      <span class="exp-link">
        参与这个实验
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5L10.5 8 6 12.5"/></svg>
      </span>
    </div>
  </a>
</section>

<div class="divider"></div>

<div class="coming">
  <p>更多实验，即将展开。</p>
</div>

<footer>Social Lab © 2026</footer>

<script>
(function(){
  const c = document.getElementById('cv1');
  if(!c) return;
  const p = c.parentElement.getBoundingClientRect();
  const d = window.devicePixelRatio||1;
  c.width = p.width*d;
  c.height = p.height*d;
  const x = c.getContext('2d');
  x.scale(d,d);
  const W = p.width, H = p.height;
  let f = 0;

  // 预计算固定元素
  const stars = Array.from({length:20},(_,i)=>[
    (i*137.5+23)%W, ((i*89.3+17)%(H*0.45)), Math.random()*6.28
  ]);
  const grassDots = Array.from({length:100},(_,i)=>[
    (i*37.7+11)%W, H*0.58+((i*23.3+7)%(H*0.4))
  ]);

  function draw(){
    x.clearRect(0,0,W,H);
    const t = f*0.008;

    // 天空
    const g = x.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0c0c1a');
    g.addColorStop(0.45,'#1a1430');
    g.addColorStop(0.75,'#2a2040');
    g.addColorStop(1,'#1a3028');
    x.fillStyle=g;
    x.fillRect(0,0,W,H);

    // 星
    stars.forEach(([sx,sy,off])=>{
      const a = 0.15+0.5*Math.abs(Math.sin(f*0.012+off));
      x.fillStyle=`rgba(255,255,255,${a})`;
      x.fillRect(sx,sy,1.2,1.2);
    });

    // 月
    x.fillStyle='rgba(255,252,230,0.85)';
    x.beginPath(); x.arc(W*0.78,H*0.16,14,0,Math.PI*2); x.fill();
    x.fillStyle='rgba(255,252,230,0.06)';
    x.beginPath(); x.arc(W*0.78,H*0.16,36,0,Math.PI*2); x.fill();

    // 远山
    x.fillStyle='#111a18';
    x.beginPath();
    x.moveTo(0,H*0.55);
    x.bezierCurveTo(W*0.2,H*0.42,W*0.4,H*0.48,W*0.55,H*0.44);
    x.bezierCurveTo(W*0.7,H*0.4,W*0.85,H*0.46,W,H*0.5);
    x.lineTo(W,H*0.6); x.lineTo(0,H*0.6);
    x.fill();

    // 草地
    const gg = x.createLinearGradient(0,H*0.57,0,H);
    gg.addColorStop(0,'#1c3c26');
    gg.addColorStop(1,'#0e2418');
    x.fillStyle=gg;
    x.fillRect(0,H*0.57,W,H*0.43);
    x.fillStyle='rgba(40,90,50,0.3)';
    grassDots.forEach(([gx,gy])=> x.fillRect(gx,gy,1.5,1.5));

    // 小路
    x.fillStyle='rgba(60,50,35,0.35)';
    x.beginPath();
    x.moveTo(0,H*0.76);
    x.quadraticCurveTo(W*0.3,H*0.7,W*0.5,H*0.73);
    x.quadraticCurveTo(W*0.7,H*0.76,W,H*0.71);
    x.lineTo(W,H*0.74);
    x.quadraticCurveTo(W*0.7,H*0.79,W*0.5,H*0.76);
    x.quadraticCurveTo(W*0.3,H*0.73,0,H*0.79);
    x.fill();

    // 树
    function tree(tx,ty,s){
      x.fillStyle='#1a1210';
      x.fillRect(tx-2*s,ty,3*s,12*s);
      x.fillStyle='#142e1a';
      x.beginPath(); x.arc(tx,ty-2*s,10*s,0,Math.PI*2); x.fill();
      x.fillStyle='#1d4425';
      x.beginPath(); x.arc(tx+3*s,ty-4*s,7*s,0,Math.PI*2); x.fill();
    }
    tree(W*0.08,H*0.5,1.2);
    tree(W*0.2,H*0.47,1.4);
    tree(W*0.85,H*0.49,1.1);
    tree(W*0.75,H*0.53,0.8);

    // 路灯
    function lamp(lx,ly){
      x.fillStyle='#444';
      x.fillRect(lx-0.8,ly,1.6,22);
      x.fillStyle='rgba(255,220,120,0.8)';
      x.beginPath(); x.arc(lx,ly,3,0,Math.PI*2); x.fill();
      x.fillStyle='rgba(255,220,120,0.04)';
      x.beginPath(); x.arc(lx,ly+10,28,0,Math.PI*2); x.fill();
    }
    lamp(W*0.38,H*0.5);
    lamp(W*0.62,H*0.48);

    // 人A
    const ax=W*0.36+Math.sin(t)*2, ay=H*0.62;
    x.fillStyle='#e8c9a0'; x.fillRect(ax,ay,4,4);
    x.fillStyle='#5a7abf'; x.fillRect(ax-0.5,ay+4,5,6);
    x.fillStyle='#2a2a2a'; x.fillRect(ax,ay+10,2,4); x.fillRect(ax+2.5,ay+10,2,4);

    // 狗A
    const dax=ax+16+Math.sin(t*1.2)*3, day=ay+5;
    x.strokeStyle='rgba(160,140,100,0.4)'; x.lineWidth=0.8;
    x.beginPath(); x.moveTo(ax+4.5,ay+6); x.quadraticCurveTo(ax+10,ay+10,dax,day+4); x.stroke();
    x.fillStyle='#c0792f'; x.fillRect(dax,day+2,7,5);
    x.fillRect(dax-2,day,3.5,3.5);
    x.fillStyle='#d89040'; x.fillRect(dax+7,day,1.5,4);
    x.fillStyle='#a06820'; x.fillRect(dax,day+7,1.5,2.5); x.fillRect(dax+4.5,day+7,1.5,2.5);

    // 人B
    const bx=W*0.58-Math.sin(t+1)*2, by=H*0.64;
    x.fillStyle='#e8c9a0'; x.fillRect(bx,by,4,4);
    x.fillStyle='#bf5a6a'; x.fillRect(bx-0.5,by+4,5,6);
    x.fillStyle='#2a2a2a'; x.fillRect(bx,by+10,2,4); x.fillRect(bx+2.5,by+10,2,4);

    // 狗B
    const dbx=bx-14-Math.sin(t*1.4+2)*3, dby=by+5;
    x.strokeStyle='rgba(160,140,100,0.4)'; x.lineWidth=0.8;
    x.beginPath(); x.moveTo(bx,by+6); x.quadraticCurveTo(bx-6,by+10,dbx+5,dby+4); x.stroke();
    x.fillStyle='#e8e4d8'; x.fillRect(dbx,dby+2,7,5);
    x.fillRect(dbx+5,dby,3.5,3.5);
    x.fillStyle='#f5f0e6'; x.fillRect(dbx-1.5,dby,1.5,3.5);
    x.fillStyle='#ccc8bc'; x.fillRect(dbx,dby+7,1.5,2.5); x.fillRect(dbx+4.5,dby+7,1.5,2.5);

    // 萤火虫
    for(let i=0;i<6;i++){
      const fx=(W*0.15)+((i*127)%(W*0.7));
      const fy=H*0.42+((i*73)%(H*0.35));
      const fl=0.2+0.5*Math.abs(Math.sin(f*0.018+i*2.1));
      x.fillStyle=`rgba(180,230,100,${fl})`;
      x.beginPath();
      x.arc(fx+Math.sin(f*0.012+i)*8, fy+Math.cos(f*0.015+i)*5, 1.2,0,Math.PI*2);
      x.fill();
    }

    f++;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
